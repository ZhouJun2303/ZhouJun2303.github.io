      <text x="1050" y="308" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">6</text>
      <text x="1050" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="#0f766e">带队交付</text>
      <text x="1050" y="250" text-anchor="middle" font-size="14" fill="#475569">评审 / 风险 / 复盘</text>
