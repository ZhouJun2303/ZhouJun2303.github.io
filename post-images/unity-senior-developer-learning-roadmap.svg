      <text x="690" y="308" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">4</text>
      <text x="690" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="#9d174d">性能质量</text>
      <text x="690" y="250" text-anchor="middle" font-size="14" fill="#475569">Profiler / 内存 / 包体</text>
