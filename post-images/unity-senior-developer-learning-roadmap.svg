    <g>
      <circle cx="150" cy="300" r="34" fill="#2563eb"/>
      <text x="150" y="308" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">1</text>
      <text x="150" y="380" text-anchor="middle" font-size="18" font-weight="700" fill="#1e40af">基础</text>
      <text x="150" y="410" text-anchor="middle" font-size="14" fill="#475569">Unity / C# / UI</text>
    </g>
    <g>
      <circle cx="330" cy="300" r="34" fill="#16a34a"/>
      <text x="330" y="308" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">2</text>
      <text x="330" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">框架</text>
      <text x="330" y="250" text-anchor="middle" font-size="14" fill="#475569">网络 / 配置 / 对象池</text>
    </g>
    <g>
      <circle cx="510" cy="300" r="34" fill="#d97706"/>
      <text x="510" y="308" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">3</text>
      <text x="510" y="380" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">热更发布</text>
      <text x="510" y="410" text-anchor="middle" font-size="14" fill="#475569">资源 / SDK / CI</text>
    </g>
    <g>
