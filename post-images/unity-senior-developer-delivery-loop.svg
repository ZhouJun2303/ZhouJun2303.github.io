<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Unity 开发高级/资深交付闭环">
  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="600" y="62" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#111827">开发高级/资深交付闭环</text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#64748b">需求不是写完就结束，必须能验证、上线、监控、回滚和复盘</text>

  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700">
    <circle cx="600" cy="340" r="112" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <text x="600" y="332" text-anchor="middle" fill="#1e40af">开发高级/资深责任</text>
    <text x="600" y="364" text-anchor="middle" font-size="15" font-weight="400" fill="#1d4ed8">质量和交付闭环</text>

    <rect x="500" y="130" width="200" height="64" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="600" y="170" text-anchor="middle" fill="#92400e">需求拆解</text>

    <rect x="790" y="205" width="200" height="64" rx="14" fill="#dcfce7" stroke="#16a34a"/>
    <text x="890" y="245" text-anchor="middle" fill="#166534">方案评审</text>

    <rect x="850" y="408" width="200" height="64" rx="14" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="950" y="448" text-anchor="middle" fill="#5b21b6">开发落地</text>

    <rect x="500" y="506" width="200" height="64" rx="14" fill="#fee2e2" stroke="#ef4444"/>
    <text x="600" y="546" text-anchor="middle" fill="#991b1b">测试验证</text>

    <rect x="150" y="408" width="200" height="64" rx="14" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="250" y="448" text-anchor="middle" fill="#075985">构建发布</text>

    <rect x="210" y="205" width="200" height="64" rx="14" fill="#fce7f3" stroke="#db2777"/>
    <text x="310" y="245" text-anchor="middle" fill="#9d174d">监控回滚</text>
  </g>

  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M700 162 C760 170 805 185 842 205"/>
    <path d="M955 270 C980 320 982 360 960 408"/>
    <path d="M850 470 C790 515 735 532 700 538"/>
    <path d="M500 538 C420 530 355 500 315 472"/>
    <path d="M250 408 C220 350 230 300 278 269"/>
    <path d="M410 215 C450 180 490 166 500 162"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>

